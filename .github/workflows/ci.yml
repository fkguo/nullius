name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install uv + pinned Python codegen tools
        run: |
          python3 -m pip install uv
          python3 -m pip install -r meta/scripts/codegen-requirements.txt

      - run: pnpm install --frozen-lockfile

      - name: Check shell boundary anti-drift
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-shell-boundary-anti-drift.mjs

      - name: Check atomic-write anti-drift (ART-03)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-atomic-write-anti-drift.mjs

      - name: Check harness-invocation anti-drift (P3-C)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-harness-invocation-anti-drift.mjs

      - name: Check integrity-receipt anti-drift (P3-A followup-4)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-integrity-receipt-anti-drift.mjs

      - name: Check skill tool-name anti-drift (P3-A followup-1)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-skill-tool-name-anti-drift.mjs

      - name: Check governance sync (AGENTS.md ↔ CLAUDE.md)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-governance-sync.mjs

      - name: Check version consistency (lockstep package versions)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-version-consistency.mjs

      - name: Check portable paths anti-drift (no machine-specific home paths)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-portable-paths-anti-drift.mjs

      - name: Check scaffold authority (single baseline-doc scaffold source)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-scaffold-authority.mjs

      - name: Check host-neutral skill paths anti-drift (no <host>/skills hardcoding)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-host-neutral-skill-paths-anti-drift.mjs

      - name: Check transcription-fidelity checklist anti-drift (a)–(g) label/range sync
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-transcription-fidelity-checklist-anti-drift.mjs

      - name: Check independent-reproduction gate anti-drift (shared-kernel discipline)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-independent-reproduction-anti-drift.mjs

      - name: Check codegen drift (meta/schemas ↔ generated)
        if: ${{ matrix.node-version == 22 }}
        run: pnpm codegen:check

      - run: pnpm -r build

      - run: pnpm --filter @nullius/hep-mcp docs:tool-counts:check

      - run: pnpm -r lint

      - run: pnpm -r test

      - run: make contract-test

  python-contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python tests (project contracts)
        run: |
          python -m pip install pytest
          python -m pytest packages/project-contracts/tests -q

      - name: Python tests (independent-reproduction gate behavior)
        run: python -m pytest skills/research-team/tests/test_independent_reproduction_gate.py -q

  skills-market-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/skills-market
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Manifest components generated from catalog (fail on drift)
        run: python3 scripts/generate_manifest_components.py --check

      - name: Validate market metadata + cross-repo manifest alignment
        run: python3 scripts/validate_market.py

      - name: skills-market tests (install authority, manifest, runtime)
        run: |
          python3 -m pip install pytest
          python3 -m pytest tests -q

      - name: Verify installer scripts parse
        run: |
          bash -n scripts/install_codex.sh
          bash -n scripts/install_opencode.sh
          bash -n scripts/install_claude_code.sh
          bash -n scripts/install_symlink_skills.sh
          bash -n scripts/install_symlink_codex.sh
          bash -n scripts/install_symlink_claude_code.sh
          bash -n scripts/install_symlink_opencode.sh
          python3 scripts/install_skill.py --help >/dev/null

      - name: Smoke test installer scripts (isolated HOME)
        run: |
          TMP_HOME="$(mktemp -d)"
          HOME="$TMP_HOME" bash scripts/install_codex.sh "$(pwd)"
          HOME="$TMP_HOME" bash scripts/install_opencode.sh "$(pwd)"
          HOME="$TMP_HOME" bash scripts/install_claude_code.sh "$(pwd)"
          test -L "$TMP_HOME/.codex/skills/nullius-market"
          test -L "$TMP_HOME/.config/opencode/skills/nullius-market"
          test -L "$TMP_HOME/.claude/skills/nullius-market"
          # Every directory a host scans as a skill MUST have a SKILL.md, else a strict skill loader
          # (e.g. OpenCode) can crash on startup. The market root is linked as a skill dir, so it must
          # carry one. Regression guard for the install-crash remediation.
          test -f "$TMP_HOME/.codex/skills/nullius-market/SKILL.md"
          test -f "$TMP_HOME/.config/opencode/skills/nullius-market/SKILL.md"
          test -f "$TMP_HOME/.claude/skills/nullius-market/SKILL.md"

      - name: Smoke test symlink installers (isolated fixtures)
        run: |
          TMP_HOME="$(mktemp -d)"
          TMP_MARKET="$(mktemp -d)"
          TMP_SKILLS="$(mktemp -d)"
          mkdir -p "$TMP_MARKET/packages" "$TMP_SKILLS/sample-skill"
          cat >"$TMP_MARKET/packages/sample-skill.json" <<'JSON'
          {"package_type":"skill-pack"}
          JSON
          cat >"$TMP_SKILLS/sample-skill/SKILL.md" <<'MD'
          # sample
          MD
          HOME="$TMP_HOME" bash scripts/install_symlink_codex.sh \
            --skills-root "$TMP_SKILLS" \
            --market-root "$TMP_MARKET" \
            --target-root "$TMP_HOME/.codex/skills"
          test -L "$TMP_HOME/.codex/skills/sample-skill"
