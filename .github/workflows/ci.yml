name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install uv + pinned Python codegen tools
        run: |
          python3 -m pip install uv
          python3 -m pip install -r meta/scripts/codegen-requirements.txt

      - run: pnpm install --frozen-lockfile

      - name: Check shell boundary anti-drift
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-shell-boundary-anti-drift.mjs

      - name: Check atomic-write anti-drift (ART-03)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-atomic-write-anti-drift.mjs

      - name: Check harness-invocation anti-drift (P3-C)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-harness-invocation-anti-drift.mjs

      - name: Check integrity-receipt anti-drift (P3-A followup-4)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-integrity-receipt-anti-drift.mjs

      - name: Check skill tool-name anti-drift (P3-A followup-1)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-skill-tool-name-anti-drift.mjs

      - name: Check governance sync (AGENTS.md ↔ CLAUDE.md)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-governance-sync.mjs

      - name: Check version consistency (lockstep package versions)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-version-consistency.mjs

      - name: Check portable paths anti-drift (no machine-specific home paths)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-portable-paths-anti-drift.mjs

      - name: Check scaffold authority (single baseline-doc scaffold source)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-scaffold-authority.mjs

      - name: Check host-neutral skill paths anti-drift (no <host>/skills hardcoding)
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-host-neutral-skill-paths-anti-drift.mjs

      - name: Check transcription-fidelity checklist anti-drift (a)–(g) label/range sync
        if: ${{ matrix.node-version == 22 }}
        run: node scripts/check-transcription-fidelity-checklist-anti-drift.mjs

      - name: Check codegen drift (meta/schemas ↔ generated)
        if: ${{ matrix.node-version == 22 }}
        run: pnpm codegen:check

      - run: pnpm -r build

      - run: pnpm --filter @nullius/hep-mcp docs:tool-counts:check

      - run: pnpm -r lint

      - run: pnpm -r test

      - run: make contract-test

  python-contracts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python tests (project contracts)
        run: |
          python -m pip install pytest
          python -m pytest packages/project-contracts/tests -q
