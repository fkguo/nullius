[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project-contracts"
version = "0.0.1"
description = "Generic scaffold/contracts package for nullius project roots"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "fkg" }]
dependencies = []

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
project_contracts = ["specs/*.json", "scaffold_templates/*.md"]
